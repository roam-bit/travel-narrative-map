<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>环中国摩旅 · 真实轨迹</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #07090d; overflow: hidden; font-family: -apple-system, "PingFang SC", sans-serif; }
  #map { position: absolute; inset: 0; }
  #hud { position: absolute; top: 0; left: 0; right: 0; z-index: 10; padding: 20px 26px;
    background: linear-gradient(#07090dee, transparent); color: #fff; pointer-events: none; }
  #hud .k { font-size: 12px; letter-spacing: 4px; color: #ffd06b; }
  #hud h1 { font-size: 24px; font-weight: 800; margin: 4px 0 10px; text-shadow: 0 2px 10px #000; }
  #hud .stats { display: flex; gap: 22px; flex-wrap: wrap; }
  #hud .stat b { font-size: 20px; color: #ff9d4d; }
  #hud .stat span { font-size: 12px; color: #ffffffaa; margin-left: 4px; }
  #loading { position: absolute; inset: 0; z-index: 20; display: flex; align-items: center; justify-content: center;
    color: #fff; background: #07090d; font-size: 16px; }
</style>
<script>window._AMapSecurityConfig = { securityJsCode: '{{AMAP_SECURITY}}' };</script>
<script src="https://webapi.amap.com/maps?v=2.0&key={{AMAP_JS_KEY}}"></script>
</head>
<body>
  <div id="map"></div>
  <div id="loading">正在绘制你的环中国轨迹…</div>
  <div id="hud">
    <div class="k">A YEAR ON THE ROAD</div>
    <h1>环中国摩旅 · 2025.3.12 → 11.14</h1>
    <div class="stats">
      <div class="stat"><b id="s-days">222</b><span>天在路上</span></div>
      <div class="stat"><b id="s-pts">14.9万</b><span>个足迹点</span></div>
      <div class="stat"><b id="s-seg">—</b><span>段轨迹</span></div>
      <div class="stat"><b>18°→53°</b><span>海南到漠河</span></div>
    </div>
  </div>
<script>
let map;
async function main(){
  const data = await (await fetch("/track_overview.json")).json();
  document.getElementById("s-seg").textContent = data.stats.segments;
  map = new AMap.Map("map", { zoom:4, center:[105,35], viewMode:"2D", mapStyle:"amap://styles/dark" });
  window.map = map;

  const lines = [];
  data.segments.forEach(seg => {
    if (seg.length < 2) return;
    lines.push(new AMap.Polyline({ path:seg, strokeColor:"#ff7a18", strokeWeight:7, strokeOpacity:0.18, lineJoin:"round", lineCap:"round", zIndex:50 }));
    lines.push(new AMap.Polyline({ path:seg, strokeColor:"#ffd06b", strokeWeight:2.2, strokeOpacity:0.95, lineJoin:"round", lineCap:"round", zIndex:51 }));
  });
  map.add(lines);
  const fit = () => map.setFitView(lines, false, [110, 80, 80, 80]);
  map.on("complete", () => { fit(); document.getElementById("loading").style.display = "none"; });
  setTimeout(() => { fit(); document.getElementById("loading").style.display = "none"; }, 2000);
}
window.onload = main;
</script>
</body>
</html>
