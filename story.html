}

/* ===== M10 BGM：bgm/ 文件夹曲库 + 本机临时加载 + 切换/音量（记住选择）===== */
let bgmTracks = [], bgmIdx = -1, bgmWantPlay = false;   // bgmWantPlay：自动播被浏览器策略拦下，等首次交互补播
const bgmAudio = () => $("#bgmAudio");

async function initBgm(){
  try {
    const r = await fetch("/api/bgm_list");
    if (r.ok){
      const d = await r.json();
      (d.files || []).forEach(f => bgmTracks.push({ name: f.replace(/\.[^.]+$/, ""), url: "/bgm/" + encodeURIComponent(f) }));
    } else if (r.status === 404){
      $("#bgmList").innerHTML = `<div class="bgm-empty">⚠️ 服务器还是旧版本：终端里 Ctrl+C 停掉后重新 <b>python3 server.py</b>，刷新页面才能读取 bgm/ 文件夹（「＋ 添加」不受影响）。</div>`;
    }
  } catch (e) {}
  const a = bgmAudio();
  a.volume = (parseInt(localStorage.getItem("bgmVol") || "70", 10)) / 100;
  $("#bgmVol").value = Math.round(a.volume * 100);
  a.addEventListener("ended", () => { if (bgmTracks.length) playBgmIndex((bgmIdx + 1) % bgmTracks.length); });   // 列表循环
  a.addEventListener("play", updateBgmUi);
  a.addEventListener("pause", updateBgmUi);
  $("#bgmFile").addEventListener("change", e => {
    const files = [...(e.target.files || [])];
    if (!files.length) return;
    const startIdx = bgmTracks.length;
    files.forEach(f => bgmTracks.push({ name: f.name.replace(/\.[^.]+$/, ""), url: URL.createObjectURL(f), local: true }));
    playBgmIndex(startIdx);
    e.target.value = "";
  });
  // 浏览器自动播放策略：未交互前 play() 会被拒 → 首次点击/触摸页面时补播
  document.addEventListener("pointerdown", () => {
    if (bgmWantPlay) bgmAudio().play().then(() => { bgmWantPlay = false; updateBgmUi(); }).catch(() => {});
  }, true);
  if (bgmTracks.length){
    const saved = parseInt(localStorage.getItem("bgmIdx") || "0", 10);
    playBgmIndex(Math.min(bgmTracks.length - 1, Math.max(0, saved)));
  } else renderBgmList();
}

function renderBgmList(){
  const box = $("#bgmList");
  if (!bgmTracks.length){
    if (!box.innerHTML.includes("旧版本"))   // 旧服务器提示别覆盖
      box.innerHTML = `<div class="bgm-empty">还没有音乐：点「＋ 添加」选本机音乐，或把 mp3 放进项目 <b>bgm/</b> 文件夹后刷新。</div>`;
    return;
  }
  box.innerHTML = bgmTracks.map((t, k) =>
    `<div class="bgm-item ${k === bgmIdx ? "active" : ""}" onclick="playBgmIndex(${k})"><span>${k === bgmIdx ? "♪" : "·"}</span><span class="nm">${t.name}${t.local ? " ·临时" : ""}</span></div>`).join("");
}

function playBgmIndex(k){
  if (!bgmTracks[k]) return;
  bgmIdx = k;
  localStorage.setItem("bgmIdx", String(k));
  const a = bgmAudio();
  a.src = bgmTracks[k].url;
  a.play().then(() => { bgmWantPlay = false; updateBgmUi(); })
    .catch(() => { bgmWantPlay = true; updateBgmUi(); });
  renderBgmList();
}

function bgmTogglePlay(){
  const a = bgmAudio();
  if (!a.src){ if (bgmTracks.length) playBgmIndex(Math.max(0, bgmIdx)); return; }
  if (a.paused) a.play().catch(() => { bgmWantPlay = true; updateBgmUi(); });
  else { a.pause(); bgmWantPlay = false; }
}

function updateBgmUi(){
  const a = bgmAudio();
  const on = a.src && !a.paused;
  $("#bgmPlayBtn").textContent = on ? "⏸" : "▶";
  $("#bgmBtn").textContent = on ? "🎵 播放中" : "🎵 BGM";
}

function setBgmVolume(v){
  bgmAudio().volume = v / 100;
  localStorage.setItem("bgmVol", String(v));
}
function toggleBgmPanel(){ $("#bgmPanel").classList.toggle("show"); }

// 开场点火音效（独立音效轨，与 BGM 分轨并行）：全程起步瞬间"启动马达→点燃→轰油门"，电影开场感。
// 彩蛋性质：自动播被浏览器拦就静默放弃（不补播，错过时机没意义）；音量跟随 BGM 音量（用户拉 0 即全静）。
let sfxIgnition = null;
function playIgnitionSfx(){
  try {
    if (!sfxIgnition) sfxIgnition = new Audio("/sfx/ignition.wav");
    const bgmVol = bgmAudio() ? bgmAudio().volume : 0.7;
    sfxIgnition.volume = Math.min(1, bgmVol * 0.85);
    sfxIgnition.currentTime = 0;
    sfxIgnition.play().catch(() => {});
  } catch (e) {}
}
function addLocalBgm(){ $("#bgmFile").click(); }

/* ===== M4 电影级收尾：抵达定格 → 拉远 + 全程流光 → 照片聚合卡片（参考用户"图2"：Apple 照片地图）=====
 * 节奏固定不吃倍速（电影感可控）：幕1 停 1.3s → 幕2 拉远 5.2s（流光延迟 0.6s 起步、提前 0.2s 扫完）→ 幕3 卡片每 150ms 弹一张。 */
const FINALE_PULL_MS = 5200;
const FINALE_FLOW_DELAY = 600;
const FINALE_CARD_STAGGER = 150;
const CLUSTER_D1_M = 80000;     // 照片地理聚类：80km 内归一簇（node 评测：325 张 → 10~11 簇）
const CARD_PX_GAP = 70;         // 定格 zoom 下卡片中心最小像素距：小簇并入大簇 → 卡片互不重叠

function easeInOutCubic(t){ return t < .5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2; }

// Web Mercator 全球像素坐标（zoom z）：聚类避让 + 全国定格视野计算共用，纯数学不动地图
function mercX(lng, z){ return (lng + 180) / 360 * 256 * Math.pow(2, z); }
function mercY(lat, z){ const s = Math.sin(lat * Math.PI / 180); return (.5 - Math.log((1 + s) / (1 - s)) / (4 * Math.PI)) * 256 * Math.pow(2, z); }

// 全程 bounds → 定格目标 {zoom, center}。底部 padding 比顶部大：给字幕留位；center 用 mercator 中点反算（纬度跨 18°~54°，算术平均会偏北）
function finaleFitView(){
  const size = (map.getSize && map.getSize()) || { width: innerWidth, height: innerHeight };
  const W = size.width || innerWidth, H = size.height || innerHeight;
  let latMin = 90, latMax = -90, lngMin = 180, lngMax = -180;
  realChapters.forEach(({c}) => (c.segments || []).forEach(seg => seg.forEach(pt => {
    const p = normalizePoint(pt); if (!p) return;
    if (p[0] < lngMin) lngMin = p[0]; if (p[0] > lngMax) lngMax = p[0];
    if (p[1] < latMin) latMin = p[1]; if (p[1] > latMax) latMax = p[1];
  })));
  const padX = 120, padTop = 110, padBot = 185;
  let zoom = 3;
  for (let z = 10; z >= 2.5; z -= .05){
    if (mercX(lngMax, z) - mercX(lngMin, z) <= W - padX * 2 && mercY(latMin, z) - mercY(latMax, z) <= H - padTop - padBot){ zoom = z; break; }
  }
  const scale = 256 * Math.pow(2, zoom);
  const midX = (mercX(lngMin, zoom) + mercX(lngMax, zoom)) / 2;
  const midY = (mercY(latMin, zoom) + mercY(latMax, zoom)) / 2 + (padBot - padTop) / 2;
  const n = Math.PI * (1 - 2 * midY / scale);
  return { zoom, center: [ midX / scale * 360 - 180, Math.atan(.5 * (Math.exp(n) - Math.exp(-n))) * 180 / Math.PI ] };
}

// 全程流光路径：各章 runs 平滑后顺序相连，stride 抽稀（平滑输出等距 120m × stride 150 ≈ 18km/点，全国视野 ~6km/px 下足够顺）。
// 再按大空隙切成多段 runs：相邻点 >MIN_BRIDGE_M(200km) = 飞机/轮渡等非骑行移动（如海南→上海航段），流光分段画、空隙不画直线硬连。
function buildFinalePath(){
  if (finalePathCache) return finalePathCache;
  const all = [];
  realChapters.forEach(({c}) => chapterRuns(c.segments).forEach(run => {
    const sm = smoothPolyline(run, 6);
    for (let k = 0; k < sm.length; k += 150) all.push(sm[k]);
    if (sm.length) all.push(sm[sm.length - 1]);
  }));
  const runs = [];
  let cur = [];
  for (const p of all){
    if (cur.length && haversineMeters(cur[cur.length - 1], p) > MIN_BRIDGE_M){
      if (cur.length > 1) runs.push(cur);
      cur = [];
    }
    cur.push(p);
  }
  if (cur.length > 1) runs.push(cur);
  finalePathCache = { runs, total: runs.reduce((s, r) => s + r.length, 0) };
  return finalePathCache;
}

// 照片聚类：章节顺序遍历(=旅程时间序) → 80km 贪心归簇 → 定格 zoom 下像素避让合并。
// 照片 EXIF GPS 是 WGS-84、地图是 GCJ-02，偏差几百米 < 全国视野 1px，可忽略不转换。
function buildPhotoClusters(targetZoom){
  const photos = [];
  Object.values(window.WEBPHOTOS || {}).forEach(grp => (grp.photos || []).forEach(p => { if (p.gps) photos.push(p); }));
  let cl = [];
  photos.forEach((p, ord) => {
    let best = null, bd = Infinity;
    cl.forEach(c => { const d = haversineMeters(c.center, p.gps); if (d < bd){ bd = d; best = c; } });
    if (best && bd < CLUSTER_D1_M){
      best.members.push(p);
      best.center = [ best.members.reduce((s,m)=>s+m.gps[0],0)/best.members.length, best.members.reduce((s,m)=>s+m.gps[1],0)/best.members.length ];
    } else cl.push({ center: p.gps.slice(), members: [p], ord });
  });
  let merged = true;
  while (merged){
    merged = false;
    outer:
    for (let i = 0; i < cl.length; i++) for (let j = i + 1; j < cl.length; j++){
      const a = cl[i], b = cl[j];
      const dpx = Math.hypot(mercX(a.center[0], targetZoom) - mercX(b.center[0], targetZoom),
                             mercY(a.center[1], targetZoom) - mercY(b.center[1], targetZoom));
      if (dpx < CARD_PX_GAP){
        const big = a.members.length >= b.members.length ? a : b, small = big === a ? b : a;
        big.members.push(...small.members);
        big.ord = Math.min(big.ord, small.ord);
        big.center = [ big.members.reduce((s,m)=>s+m.gps[0],0)/big.members.length, big.members.reduce((s,m)=>s+m.gps[1],0)/big.members.length ];
        cl = cl.filter(c => c !== small);
        merged = true; break outer;
      }
    }
  }
  cl.sort((x, y) => x.ord - y.ord);   // 弹出顺序 = 旅程顺序
  return cl;
}

// 卡片封面用 200px 缩略图（64px 显示加载 1280px 大图太浪费：~320KB→~12KB）；缩略缺失时回退原图
const thumbUrl = f => encodeURI("/photos_web/_thumbs/" + f.replace(/^photos_web\//, ""));

function addPhotoCard(c){
  try {   // 投影坏死（瓦片加载失败的环境）时单张卡片跳过，不断收尾流程
    const el = document.createElement("div");
    el.className = "photo-card";
    el.innerHTML = `<div class="pc-frame"><img src="${thumbUrl(c.members[0].file)}" onerror="this.onerror=null;this.src='${encodeURI("/" + c.members[0].file)}'" alt=""><span class="pc-count">${c.members.length}</span></div><div class="pc-tail"></div>`;
    el.onclick = () => openClusterLightbox(c);   // 点卡片 → 大图浏览这个地点的所有照片
    const mk = new AMap.Marker({ position: c.center, content: el, anchor: "bottom-center", zIndex: 135 });
    map.add(mk); finaleMarkers.push(mk);
  } catch (e) {}
}

// 簇内照片大图浏览：复用 #lb 灯箱，点图片切下一张、点黑底关闭
function openClusterLightbox(cluster){
  const lb = $("#lb"), img = lb.querySelector("img"), meta = $("#lbMeta");
  let k = 0;
  const show = () => {
    img.src = encodeURI("/" + cluster.members[k].file);
    meta.textContent = `${k + 1} / ${cluster.members.length} · 点图片看下一张`;
  };
  img.onclick = e => { e.stopPropagation(); k = (k + 1) % cluster.members.length; show(); };
  show();
  lb.classList.add("show");
}

// 收尾纯流光（用户定：没点亮的轨迹一概不画）——预画章节线全隐，画面只有流光扫过的亮线
function dimLinesForFinale(){
  hideAllChapterLines();
}

function removeDistBadge(){
  if (distBadge){ try { map.remove(distBadge); } catch(e){} }
  distBadge = null; distBadgeEl = null;
}

// 地图投影就绪检测：complete 前 lngLatToContainer 算出 NaN，此时加 Marker 会抛 Pixel(NaN,NaN)
function projectionReady(){
  try {
    const px = map.lngLatToContainer([104, 35]);
    const x = px && (px.x ?? (px.getX && px.getX()));
    return Number.isFinite(x);
  } catch (e) { return false; }
}

function makeFlowLines(firstPt){
  const glowLine = new AMap.Polyline({ path: [firstPt], strokeColor: "#ff7a18", strokeWeight: 9, strokeOpacity: .45, lineJoin: "round", lineCap: "round", zIndex: 48 });
  const coreLine = new AMap.Polyline({ path: [firstPt], strokeColor: "#ffe9b0", strokeWeight: 3, strokeOpacity: 1, lineJoin: "round", lineCap: "round", zIndex: 49 });
  map.add(glowLine); map.add(coreLine);
  finaleObjs.push(glowLine, coreLine);
  return { glowLine, coreLine };
}

function showFinaleCaption(){
  const photoCount = Object.values(window.WEBPHOTOS || {}).reduce((s, g) => s + ((g.photos || []).length), 0);
  const days = CH.reduce((s, c) => s + (c.stats?.days || 0), 0);   // 含转场休整 = 222，与总览页一致
  $("#finaleCaption .fc-main").textContent = `环中国 · ${TOTAL_KM.toLocaleString()} 公里 · ${days} 天 · ${photoCount} 张照片`;
  $("#finaleCaption").classList.add("show");
  $("#finaleSkipBtn").style.display = "none";
  $("#finaleReplayBtn").style.display = "";
  $("#finaleExitBtn").style.display = "";
}

// 定格画面「再看一遍」：清收尾、直接重播全程（不回总览，演示场景一键循环）
function replayAll(){
  clearFinale();
  $("#overview").classList.add("hide");
  $("#chapter").classList.add("hide");
  playAll();
}

async function playFinale(opts = {}){
  if (finaleOn) return;
  finaleOn = true;
  const token = ++finaleToken;
  playing = false;
  stopTravelAnimation(false);
  $("#overview").classList.add("hide");
  $("#chapter").classList.add("hide");
  $("#travelControls").classList.add("hide");
  $("#finaleBtns").classList.add("show");
  $("#finaleSkipBtn").style.display = "";
  $("#finaleReplayBtn").style.display = "none";
  $("#finaleExitBtn").style.display = "none";

  const fit = finaleFitView();
  const fp = buildFinalePath();
  if (fp.total < 2){ exitFinale(); return; }
  const clusters = buildPhotoClusters(fit.zoom);
  clusters.forEach(c => { const im = new Image(); im.src = thumbUrl(c.members[0].file); });   // 预载卡片封面（200px 缩略）

  // 投影未就绪（complete 前）加 Marker 必抛 Pixel(NaN)：慢网下 ?finale=1 的 3s 兜底可能跑在 complete 前 → 等就绪再开演（最多 6s，等不到就靠各 marker 的 try 跳过）
  for (let w = 0; w < 40 && !projectionReady(); w++){ if (map.render) map.render(); await sleep(150); }
  if (token !== finaleToken) return;

  // —— 幕1 · 抵达：停一拍，距离牌亮出全程总里程 ——
  const lastRun = fp.runs[fp.runs.length - 1];
  const endPt = lastRun[lastRun.length - 1];
  if (opts.debugJump){   // ?finale=1 直达：骑手摆到终点、相机摆到近景，免跑 8 章
    try { setRiderAt(endPt, 0); } catch (e) {}
    setMapPitch(52);
    map.setZoomAndCenter(7.2, endPt, true);
    await sleep(800);
  } else {
    if (distBadgeEl){
      distBadgeEl.textContent = `全程 ${TOTAL_KM.toLocaleString()} 公里`;
      distBadgeEl.style.animation = "badgePulse .9s ease";
    }
    await sleep(1300);
  }
  if (token !== finaleToken) return;

  // —— 幕2 · 拉远 + 流光：相机插值（近景俯冲 → 全国平视野）+ 一道光沿全程轨迹扫到终点 ——
  clearChMarkers(); clearActiveSmoothLines(); removeDistBadge();
  dimLinesForFinale();
  const segs = fp.runs.map(r => makeFlowLines(r[0]));   // 每个骑行段一对发光线：段间空隙（飞机/轮渡）不画线
  const segStart = [];
  { let acc = 0; for (const r of fp.runs){ segStart.push(acc); acc += r.length; } }
  const headEl = document.createElement("div");
  headEl.className = "flow-head";
  let headMk = null;
  try {
    headMk = new AMap.Marker({ position: fp.runs[0][0], content: headEl, anchor: "center", zIndex: 132 });
    map.add(headMk); finaleMarkers.push(headMk);
  } catch (e) {}

  const startZoom = map.getZoom ? map.getZoom() : 7;
  const startPitch = map.getPitch ? map.getPitch() : 52;
  const c0 = map.getCenter && map.getCenter();
  const startCenter = c0 ? [c0.lng, c0.lat] : endPt.slice();
  const fillAllSegs = () => segs.forEach((sg, q) => { try { sg.glowLine.setPath(fp.runs[q]); sg.coreLine.setPath(fp.runs[q]); } catch (e) {} });
  await new Promise(res => {
    const t0 = performance.now();
    let lastIdx = 0, tickErrs = 0, doneSeg = -1;   // doneSeg：已画满的最大段号（光头越过的段一次性补满）
    const tick = now => {
      if (token !== finaleToken) return res();
      const t = Math.min(1, (now - t0) / FINALE_PULL_MS);
      try {
        const e = easeInOutCubic(t);
        map.setZoomAndCenter(
          startZoom + (fit.zoom - startZoom) * e,
          [ startCenter[0] + (fit.center[0] - startCenter[0]) * e, startCenter[1] + (fit.center[1] - startCenter[1]) * e ],
          true
        );
        setMapPitch(startPitch * (1 - e));
        const ft = Math.max(0, Math.min(1, (now - t0 - FINALE_FLOW_DELAY) / (FINALE_PULL_MS - FINALE_FLOW_DELAY - 200)));
        const gIdx = Math.max(1, Math.round(easeInOutSine(ft) * (fp.total - 1)));
        if (gIdx > lastIdx){
          let s = 0;
          while (s + 1 < fp.runs.length && segStart[s + 1] <= gIdx) s++;
          for (let q = doneSeg + 1; q < s; q++){ try { segs[q].glowLine.setPath(fp.runs[q]); segs[q].coreLine.setPath(fp.runs[q]); } catch (e2) {} }
          if (s - 1 > doneSeg) doneSeg = s - 1;
          const local = gIdx - segStart[s];
          const part = fp.runs[s].slice(0, local + 1);
          segs[s].glowLine.setPath(part); segs[s].coreLine.setPath(part);
          if (headMk) headMk.setPosition(fp.runs[s][local]);   // 跨段时光头直接跳过空隙（飞机/轮渡本来就是瞬移）
          lastIdx = gIdx;
        }
        tickErrs = 0;
      } catch (err) {
        // 单帧异常跳过；连续异常=地图引擎瘫了（瓦片加载失败的环境）→ 放弃运镜直接进定格，绝不卡死黑屏
        if (++tickErrs > 20){ try { fillAllSegs(); } catch (e2) {} return res(); }
      }
      if (t >= 1){
        headEl.style.transition = "opacity .8s"; headEl.style.opacity = "0";   // 光头到终点后熄灭
        try { fillAllSegs(); } catch (e2) {}                                   // 收口：进度取整可能差最后几个点，定格前补满
        return res();
      }
      finaleRaf = requestAnimationFrame(tick);
    };
    finaleRaf = requestAnimationFrame(tick);
  });
  if (token !== finaleToken) return;

  // —— 幕3 · 照片聚合卡片按旅程顺序弹出 + 定格字幕 ——
  for (const c of clusters){
    if (token !== finaleToken) return;
    addPhotoCard(c);
    await sleep(FINALE_CARD_STAGGER);
  }
  if (token !== finaleToken) return;
  showFinaleCaption();
}

// 跳过运镜：一步到位重建定格画面（相机/流光/卡片/字幕全量就位）
function skipFinale(){
  finaleToken++;
  cancelAnimationFrame(finaleRaf);
  finaleOn = true;
  clearFinaleOverlays();
  clearChMarkers(); clearActiveSmoothLines(); removeDistBadge();
  dimLinesForFinale();
  const fit = finaleFitView();
  const fp = buildFinalePath();
  setMapPitch(0);
  map.setZoomAndCenter(fit.zoom, fit.center, true);
  fp.runs.forEach(r => { try { const { glowLine, coreLine } = makeFlowLines(r[0]); glowLine.setPath(r); coreLine.setPath(r); } catch (e) {} });
  buildPhotoClusters(fit.zoom).forEach(addPhotoCard);
  showFinaleCaption();
}

function clearFinaleOverlays(){
  finaleObjs.forEach(o => { try { map.remove(o); } catch(e){} });
  finaleMarkers.forEach(m => { try { map.remove(m); } catch(e){} });
  finaleObjs = []; finaleMarkers = [];
}

function clearFinale(){
  if (!finaleOn && !finaleObjs.length && !finaleMarkers.length) return;
  finaleToken++;
  cancelAnimationFrame(finaleRaf);
  clearFinaleOverlays();
  // 恢复章节线原色（压暗时改过 strokeColor；透明度由 showOverview/dimOthers 各自接管）
  chLines.forEach(polys => polys.forEach(p => {
    const glow = p.getOptions().strokeWeight > 4;
    p.setOptions({ strokeColor: glow ? "#ff7a18" : "#ffd06b" });
  }));
  $("#finaleCaption").classList.remove("show");
  $("#finaleBtns").classList.remove("show");
  finaleOn = false;
}

function exitFinale(){ clearFinale(); showOverview(); }
window.__finale = playFinale;   // console 调试入口

function nextCh(){
  const k = realChapters.findIndex(x=>x.i===curIdx);
  if (k < realChapters.length-1) enterChapter(realChapters[k+1].i);
  else showOverview();
}
function prevCh(){
  const k = realChapters.findIndex(x=>x.i===curIdx);
  if (k > 0) enterChapter(realChapters[k-1].i);
  else showOverview();
}

async function playAll(){
  playing = true;
  clearFinale();
  playIgnitionSfx();   // 起步点火：独立音效轨，BGM 同时进场（电影开场感）
  $("#overview").classList.add("hide");
  $("#chapter").classList.add("hide");   // 章节面板由 journey 跨过各章起点时自动亮出并切换
  clearChMarkers();
  // M9 一镜到底（用户定）：小人从丹东一口气跑到终点，不再分章打断；章节面板随里程自动切换
  let completed = await playJourney();
  // 播放中调丝滑/换载具 → "restart" → 从骑手当前位置续播（不从头），链不断
  while (completed === "restart" && playing) completed = await playJourney({ resume: true });
  if (!playing || !completed) return;
  if (playing) playFinale();   // 跑完全程 → 电影级收尾（拉远+流光+照片聚合）
}

window.onload = boot;
</script>
